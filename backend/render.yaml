services:
  - type: web
    name: corely-ai-backend
    runtime: python
    plan: free
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: JWT_SECRET
        value: "corely-ai-secret-2024-change-this"
      - key: DATABASE_URL
        fromDatabase:
          name: corely-ai-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: corely-ai-db
    plan: free
    databaseName: corely_ai
